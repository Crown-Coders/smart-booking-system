databases:
  - name: mentalcom-db
    databaseName: smart_booking_db
    user: smart_booking_user

services:
  - type: web
    name: mentalcom-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mentalcom-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://smart-booking-system-8cgy.onrender.com
      - key: GROQ_API_KEY
        sync: false
      - key: BACKEND_URL
        sync: false
